<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Import Picks</title>
<style>
  body { font-family: monospace; background: #0a0d12; color: #e8edf2; padding: 32px; }
  h2 { color: #00d084; margin-bottom: 16px; }
  .row { padding: 6px 0; border-bottom: 1px solid #1e2630; font-size: 13px; }
  .ok { color: #00d084; }
  .err { color: #ff4757; }
  #status { margin-top: 16px; font-size: 14px; }
  button { background: #00d084; border: none; color: #000; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
  button:disabled { opacity: 0.4; }
</style>
</head>
<body>
<h2>⚡ Import 13 picks from April 26</h2>
<button id="btn" onclick="run()">ADD ALL PICKS TO TRACKER</button>
<div id="log"></div>
<div id="status"></div>

<script>
const URL = 'https://script.google.com/macros/s/AKfycbzINtK__4ges-rEU6Qqg-XP467pKRK5ljVUP6sMSQ0H1zRbB1FLtpY1A7pjM_6Sx-7d/exec';

const PICKS = [
  { away:'LAA', home:'KC',  pick:'KC',  winPct:'53.2%', predTotal:'5.7',  totalLine:'8.5', mlEdge:'0.58',   recML:'Pass — edge too small', recTotal:'UNDER 8.5' },
  { away:'CHC', home:'LAD', pick:'LAD', winPct:'55.8%', predTotal:'6.69', totalLine:'8.5', mlEdge:'1.57',   recML:'Pass — edge too small', recTotal:'UNDER 8.5' },
  { away:'SEA', home:'STL', pick:'SEA', winPct:'54.1%', predTotal:'9',    totalLine:'8.5', mlEdge:'-2.17',  recML:'Fade — model disagrees', recTotal:'OVER 8.5'  },
  { away:'PIT', home:'MIL', pick:'PIT', winPct:'58.4%', predTotal:'7.09', totalLine:'7.5', mlEdge:'12.62',  recML:'PIT ML (Quarter Kelly)', recTotal:'UNDER 7.5' },
  { away:'NYY', home:'HOU', pick:'HOU', winPct:'78.4%', predTotal:'9.99', totalLine:'8.5', mlEdge:'34.71',  recML:'HOU ML (Quarter Kelly)', recTotal:'OVER 8.5'  },
  { away:'WAS', home:'CWS', pick:'CWS', winPct:'73.9%', predTotal:'7.73', totalLine:'8',   mlEdge:'20.72',  recML:'CWS ML (Quarter Kelly)', recTotal:'UNDER 8'   },
  { away:'MIN', home:'TB',  pick:'TB',  winPct:'81.8%', predTotal:'8.89', totalLine:'8.5', mlEdge:'24.61',  recML:'TB ML (Quarter Kelly)',  recTotal:'OVER 8.5'  },
  { away:'DET', home:'CIN', pick:'DET', winPct:'54.5%', predTotal:'6.89', totalLine:'8.5', mlEdge:'4.98',   recML:'DET ML (Quarter Kelly)', recTotal:'UNDER 8.5' },
  { away:'MIA', home:'SF',  pick:'SF',  winPct:'61.7%', predTotal:'5.7',  totalLine:'7.5', mlEdge:'6.64',   recML:'SF ML (Quarter Kelly)',  recTotal:'UNDER 7.5' },
  { away:'OAK', home:'TEX', pick:'TEX', winPct:'67.6%', predTotal:'9.61', totalLine:'8.5', mlEdge:'14.37',  recML:'TEX ML (Quarter Kelly)', recTotal:'OVER 8.5'  },
  { away:'PHI', home:'ATL', pick:'ATL', winPct:'56.2%', predTotal:'9.25', totalLine:'8.5', mlEdge:'-5.43',  recML:'Fade — model disagrees', recTotal:'OVER 8.5'  },
  { away:'CLE', home:'TOR', pick:'TOR', winPct:'66.2%', predTotal:'10.89',totalLine:'8.5', mlEdge:'11.08',  recML:'TOR ML (Quarter Kelly)', recTotal:'OVER 8.5'  },
  { away:'BOS', home:'BAL', pick:'BAL', winPct:'57.1%', predTotal:'8.2',  totalLine:'8.5', mlEdge:'0.78',   recML:'Pass — edge too small', recTotal:'UNDER 8.5' },
];

async function run() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Adding picks…';
  log.innerHTML = '';
  let ok = 0, fail = 0;

  for (const p of PICKS) {
    const row = { ...p, date: '2026-04-26' };
    try {
      const r = await fetch(URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'write', row })
      });
      const d = await r.json();
      if (d.success) {
        ok++;
        log.innerHTML += `<div class="row ok">✓ ${p.away} @ ${p.home} — Pick: ${p.pick} — ID: ${d.id}</div>`;
      } else {
        throw new Error(d.error || 'failed');
      }
    } catch(e) {
      fail++;
      log.innerHTML += `<div class="row err">✗ ${p.away} @ ${p.home} — ${e.message}</div>`;
    }
    await new Promise(r => setTimeout(r, 300)); // small delay between writes
  }

  status.innerHTML = `<br><span class="${fail===0?'ok':'err'}">Done — ${ok} added, ${fail} failed.</span><br><br>
    <a href="tracker_clean.html" style="color:#00d084;">→ Open Tracker</a> then click <strong>Check Results</strong> to grade all games.`;
  btn.textContent = 'Done';
}
</script>
</body>
</html>
